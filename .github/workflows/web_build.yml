name: Flutter Web Build & Release

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Нужно для создания релиза
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Web
        run: |
          flutter config --enable-web
          flutter pub get
          flutter build web --release --base-href "/"

      # Архивируем билд для удобства скачивания
      - name: Archive Build
        run: |
          cd build/web
          zip -r ../../web-build.zip .

      # Автоматически обновляем "Latest" релиз с этим файлом
      - name: Update Release
        uses: andelf/github-release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: latest
          files: web-build.zip
          force_update: true
