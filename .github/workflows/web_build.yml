name: Flutter Web Build & Release

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Нужно для создания релиза
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Web
        run: |
          flutter config --enable-web
          flutter pub get
          flutter build web --release --base-href "/"

      # 1. Архивируем билд (если еще не сделано в предыдущем шаге)
      - name: Archive Build
        run: |
          cd build/web
          zip -r ../../web-build.zip .

      # 2. Создаем или обновляем релиз "latest"
      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: web-build.zip
          # Это заставит экшен перезаписывать файлы в релизе "latest"
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
